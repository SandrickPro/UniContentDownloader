# UniContentDownloader Example Configuration
#
# This file shows example configuration for testing the system.
# Copy and modify as needed for your setup.

[TargetedCreator]
# Username of the content creator (required)
username = example_creator

[Authorization]
# Your Fansly authorization token (required)
# Get this from browser dev tools while logged into Fansly
authorization_token = YOUR_AUTH_TOKEN_HERE

# Your browser's user agent string (required)  
# Get this from browser dev tools or whatsmyuseragent.org
user_agent = YOUR_USER_AGENT_HERE

[Download]
# Directory to save downloads to
download_directory = ./Downloads

# Organize downloads into separate folders by message type
separate_messages = true

# Download preview/thumbnail images
separate_previews = false

# Show download progress notifications
show_downloads = true

[Advanced]
# Number of concurrent downloads (1-5 recommended)
concurrent_downloads = 2

# Download timeout in seconds
timeout = 300

# Retry failed downloads
retry_failed = true

# Maximum retries per item
max_retries = 3